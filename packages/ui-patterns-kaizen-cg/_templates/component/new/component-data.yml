---
to: <% if (is_pattern === 'yes') { %><%= h.src() %>/templates/patterns/<%= h.changeCase.lower(h.inflection.pluralize(component_type)) %>/<%= h.changeCase.lower(h.inflection.dasherize(name)) %>/<%= h.changeCase.lower(component_type).charAt(0) %>_<%= h.changeCase.lower(h.inflection.dasherize(name)) %>ui_patterns.yml<% } else { %><%= h.src() %>/templates/patterns/<%= h.changeCase.lower(h.inflection.pluralize(component_type)) %>/<%= h.changeCase.lower(h.inflection.dasherize(name)) %>/<%= h.changeCase.lower(component_type).charAt(0) %>_<%= h.changeCase.lower(h.inflection.dasherize(name)) %>.yml<% } %>
---
<%= h.changeCase.lower(component_type).charAt(0) %>_<%= h.changeCase.lower(h.inflection.snakeCase(name)) %>:
  sb:
    category: '<%= component_type %>s'
    name: '<%= h.inflection.capitalize(name) %>'
  use: '@<%= h.changeCase.snakeCase(h.themeName) %>/patterns/<%= h.changeCase.lower(h.inflection.pluralize(component_type)) %>/<%= h.changeCase.lower(h.inflection.dasherize(name)) %>/<%= h.changeCase.lower(component_type).charAt(0) %>-<%= h.changeCase.lower(h.inflection.dasherize(name)) %>.html.twig'
  label: '<%= h.inflection.capitalize(h.inflection.pluralize(component_type)) %> <%= h.changeCase.lower(name) %>'
  fields:
    content:
      type: render
      label: 'Content'
      preview: 'Lorem ipsum'
  settings:
    <%= h.changeCase.lower(component_type).charAt(0) %>_<%= h.changeCase.lower(h.inflection.snakeCase(name)) %>_custom_classes:
      type: textfield
      label: Set a custom classnames for %= h.inflection.lower(h.inflection.pluralize(component_type)) %> <%= h.changeCase.lower(name) %>. Split classnames with single space
